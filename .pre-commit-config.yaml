repos:
  - repo: local
    hooks:

    - id: format
      name: format
      entry: make format
      language: system

    - id: lint
      name: lint
      entry: make lint
      language: system

    - id: type_check
      name: type_check
      entry: make type_check
      language: system

    - id: test
      name: test
      entry: make test
      language: system
